<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Master Set Binders — Pokemon Pack Guide</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a0a; color: #fff; padding: 16px;
  }
  .container { max-width: 1100px; margin: 0 auto; }
  header {
    text-align: center; padding: 20px 0; border-bottom: 2px solid #333; margin-bottom: 24px;
  }
  h1 { font-size: 1.8rem; margin-bottom: 6px; }
  .sub { color: #888; font-size: 0.9rem; }
  .sub a { color: #4a9eff; text-decoration: none; }
  .controls {
    display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
    margin-bottom: 20px; padding: 12px; background: #1a1a1a;
    border: 1px solid #333; border-radius: 10px;
  }
  .controls input[type=search] {
    flex: 1; min-width: 200px; padding: 10px 12px;
    background: #0a0a0a; border: 1px solid #333; border-radius: 6px;
    color: #fff; font-size: 0.95rem;
  }
  .stats { color: #aaa; font-size: 0.85rem; margin-left: auto; }
  .stats strong { color: #4ade80; }
  .series-section { margin-bottom: 28px; }
  .series-title {
    font-size: 1.15rem; font-weight: 600; color: #4a9eff;
    padding: 8px 0; margin-bottom: 12px; border-bottom: 1px dashed #333;
  }
  .series-title .count { color: #666; font-size: 0.85rem; font-weight: 400; margin-left: 8px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 10px;
  }
  .set-tile {
    display: block; padding: 12px; background: #1a1a1a;
    border: 1px solid #2a2a2a; border-radius: 8px;
    color: #fff; text-decoration: none;
    transition: border-color .15s, transform .15s;
  }
  .set-tile:hover { border-color: #4a9eff; transform: translateY(-2px); }
  .set-tile-name { font-weight: 600; font-size: 0.95rem; margin-bottom: 4px; }
  .set-tile-meta { color: #888; font-size: 0.78rem; line-height: 1.4; }
  .set-tile-progress {
    margin-top: 8px; padding-top: 8px; border-top: 1px solid #2a2a2a;
    font-size: 0.75rem; color: #666; font-variant-numeric: tabular-nums;
  }
  .set-tile-progress strong { color: #4ade80; }
  .set-tile-value {
    margin-top: 4px; font-size: 0.78rem; color: #888;
    font-variant-numeric: tabular-nums;
  }
  .set-tile-value .total-val { color: #aaa; }
  .set-tile-value .your-val { color: #4ade80; font-weight: 600; }
  .sync-bar {
    display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
    justify-content: flex-end;
    margin-bottom: 10px; padding: 6px 10px;
    font-size: 0.82rem;
  }
  .sync-bar .sync-btn, .sync-bar .sync-gear {
    padding: 6px 10px; background: #1a1a1a; border: 1px solid #333;
    border-radius: 6px; color: #ddd; cursor: pointer;
    font-size: 0.82rem; font-weight: 600;
    font-family: inherit;
  }
  .sync-bar .sync-btn:hover, .sync-bar .sync-gear:hover { background: #2a2a2a; }
  .sync-bar .sync-btn[disabled] { opacity: 0.5; cursor: not-allowed; }
  .sync-bar .sync-status {
    color: #888; font-size: 0.78rem; margin-right: auto;
    font-variant-numeric: tabular-nums;
  }
  .sync-bar .sync-status.ok { color: #4ade80; }
  .sync-bar .sync-status.err { color: #ff8a8a; }
  .sync-bar .sync-status.busy { color: #ffd24a; }
  .mode-bar {
    display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
    margin-bottom: 12px; padding: 10px 12px; background: #131313;
    border: 1px solid #2a2a2a; border-radius: 10px;
  }
  .mode-bar .mode-label {
    color: #888; font-size: 0.85rem; font-weight: 600; margin-right: 4px;
  }
  .mode-bar .mode-btn {
    padding: 8px 14px; background: #1a1a1a; border: 1px solid #333;
    border-radius: 6px; color: #ddd; cursor: pointer;
    font-size: 0.85rem; font-weight: 600;
    transition: background .12s, border-color .12s;
  }
  .mode-bar .mode-btn:hover { background: #2a2a2a; }
  .mode-bar .mode-btn.active { background: #4a9eff; border-color: #4a9eff; color: #fff; }
  .mode-bar .mode-hint {
    color: #666; font-size: 0.78rem; margin-left: auto; font-style: italic;
  }
  .empty { padding: 40px; text-align: center; color: #666; }
  .loading { padding: 40px; text-align: center; color: #888; }
</style>

</head>
<body>
<div class="container">
  <div class="sync-bar" id="syncBar" style="display:none;">
    <span class="sync-status" id="syncStatus"></span>
    <button class="sync-btn" id="syncBtn" title="Sync collection across devices">🔄 Sync</button>
    <button class="sync-gear" id="syncGear" title="Sync settings">⚙</button>
  </div>
  <header>
    <h1>📖 All Master Set Binders</h1>
    <div class="sub">Number-ordered checklists for every Pokémon set. 9-pocket binder layout.</div>
    <div class="sub" style="margin-top:6px;"><a href="index.html">← Back to set database</a></div>
  </header>
  <div class="mode-bar">
    <span class="mode-label">View:</span>
    <button class="mode-btn active" data-mode="complete">Set Complete</button>
    <button class="mode-btn" data-mode="master">Master Set</button>
    <span class="mode-hint" id="modeHint">One of each numbered card</span>
  </div>
  <div class="controls">
    <input type="search" id="search" placeholder="Search by set name or series…">
    <div class="stats" id="stats">Loading…</div>
  </div>
  <div id="content" class="loading">Loading binder library…</div>
</div>
<script>
(function(){
  let manifest = null;
  let query = '';

  // Directory-wide view mode. Persisted globally (separate from the per-set
  // mode in binder.html). Default Set Complete to match binder.html — most
  // users care about completion, not every variant.
  const MODE_KEY = 'binders_directory_mode';
  function loadMode(){
    const v = localStorage.getItem(MODE_KEY);
    return (v === 'master') ? 'master' : 'complete';
  }
  function saveMode(){ localStorage.setItem(MODE_KEY, mode); }
  let mode = loadMode();

  // localStorage schema: object { id: qty }. Older builds stored an Array
  // of IDs (binary have/not). Both formats are accepted here.
  function getHaveQty(sid){
    let raw;
    try { raw = JSON.parse(localStorage.getItem('binder_have_'+sid) || '{}'); } catch(e){ return {}; }
    if (Array.isArray(raw)){
      const obj = {};
      for (const id of raw) obj[id] = 1;
      return obj;
    }
    if (raw && typeof raw === 'object'){
      const out = {};
      for (const k in raw){
        const v = +raw[k];
        if (Number.isFinite(v) && v > 0) out[k] = v;
      }
      return out;
    }
    return {};
  }

  // Mode-aware progress count.
  // - master: number of unique variant slots with qty > 0
  // - complete: number of unique base card IDs (cardId before "__variant"
  //   suffix) with at least one variant having qty > 0. Approximates
  //   binder.html's Set Complete count without requiring a JSON load.
  function getProgress(sid){
    const q = getHaveQty(sid);
    if (mode === 'master'){
      let n = 0;
      for (const k in q) if (q[k] > 0) n++;
      return n;
    }
    const cardIds = new Set();
    for (const k in q){
      if (q[k] <= 0) continue;
      cardIds.add(k.split('__')[0]);
    }
    return cardIds.size;
  }

  function fmtMoney(p){
    if (p == null || isNaN(p)) return '$0';
    return '$' + Math.round(p).toLocaleString();
  }

  const SERIES_ORDER = [
    'Mega Evolution','Scarlet & Violet','Sword & Shield','Sun & Moon','XY','Black & White',
    'HeartGold & SoulSilver','Platinum','Diamond & Pearl','EX','E-Card','Neo','Gym','Base',
    'POP','Other'
  ];

  function render(){
    const wrap = document.getElementById('content');
    wrap.classList.remove('loading');
    if (!manifest){ wrap.textContent = 'Failed to load.'; return; }

    const q = query.trim().toLowerCase();
    const filtered = manifest.sets.filter(s=>{
      if (!q) return true;
      return s.name.toLowerCase().includes(q) || (s.series||'').toLowerCase().includes(q);
    });

    // group by series
    const groups = {};
    filtered.forEach(s=>{
      const k = s.series || 'Other';
      (groups[k] = groups[k] || []).push(s);
    });
    // sort sets within each series by release_date desc
    Object.values(groups).forEach(arr=> arr.sort((a,b)=> (b.release_date||'').localeCompare(a.release_date||'')));

    // ordered series
    const orderedSeries = [
      ...SERIES_ORDER.filter(k=> groups[k]),
      ...Object.keys(groups).filter(k=> !SERIES_ORDER.includes(k)).sort(),
    ];

    if (orderedSeries.length === 0){
      wrap.innerHTML = '<div class="empty">No matching sets.</div>';
      return;
    }

    let html = '';
    orderedSeries.forEach(series=>{
      const sets = groups[series];
      html += `<div class="series-section">
        <div class="series-title">${series}<span class="count">${sets.length} ${sets.length===1?'set':'sets'}</span></div>
        <div class="grid">`;
      sets.forEach(s=>{
        const got = getProgress(s.id);
        const cards = s.total_cards || 0;
        const slots = s.total_slots || cards;
        const totalValue = s.total_value || 0;
        // Denominator + suffix depend on the active view mode.
        const denom = (mode === 'master') ? slots : cards;
        const pct = denom ? Math.round(got/denom*100) : 0;
        const otherSuffix = (slots !== cards)
          ? (mode === 'master' ? ` (${cards} cards)` : ` of ${slots} slots`)
          : '';
        const progBar = got > 0
          ? `<div class="set-tile-progress"><strong>${got}</strong>/${denom} (${pct}%)${otherSuffix}</div>`
          : '';
        const metaLine = (slots !== cards)
          ? `${cards} cards · ${slots} slots · ${s.release_date || ''}`
          : `${cards} cards · ${s.release_date || ''}`;
        // Value line: total stays as the master-set canonical total since
        // that's the benchmark price most collectors reference. "Your"
        // populated by lazy fetch for started sets only.
        let valueLine = '';
        if (totalValue > 0){
          const yourSlot = (got > 0) ? `<span class="your-val" data-set-value-for="${s.id}"></span>` : '';
          valueLine = `<div class="set-tile-value">
            <span class="total-val">Worth ${fmtMoney(totalValue)}</span>${yourSlot}
          </div>`;
        }
        html += `<a class="set-tile" href="binder.html?set=${s.id}" data-set-id="${s.id}">
          <div class="set-tile-name">${s.name}</div>
          <div class="set-tile-meta">${metaLine}</div>
          ${valueLine}
          ${progBar}
        </a>`;
      });
      html += `</div></div>`;
    });
    wrap.innerHTML = html;

    // stats
    const totalSets = manifest.sets.length;
    const startedSets = manifest.sets.filter(s=> getProgress(s.id) > 0).length;
    document.getElementById('stats').innerHTML = `<strong>${totalSets}</strong> binders · ${startedSets} started`;

    // Lazy-load "your value" for started sets only. Bounded by user's own
    // collection size, typically 0–5 sets, so 1 fetch per started set is fine.
    manifest.sets
      .filter(s => getProgress(s.id) > 0 && (s.total_value || 0) > 0)
      .forEach(s => loadYourValue(s.id));
  }

  // Per-tile background fetch: load the set's binder JSON and sum the raw
  // prices of slots the user has marked. Updates the matching .your-val span.
  // Cached in-memory across re-renders (search filtering re-renders).
  const yourValueCache = {};
  function loadYourValue(sid){
    if (yourValueCache[sid] != null){
      paintYourValue(sid, yourValueCache[sid]);
      return;
    }
    fetch('data/binder/' + sid + '.json')
      .then(r => r.ok ? r.json() : null)
      .then(d => {
        if (!d) return;
        const haveQty = getHaveQty(sid);
        let mine = 0;
        for (const c of d.cards){
          const qty = haveQty[c.id] || 0;
          if (c.raw != null && qty > 0) mine += c.raw * qty;
        }
        yourValueCache[sid] = mine;
        paintYourValue(sid, mine);
      })
      .catch(()=>{});
  }
  function paintYourValue(sid, mine){
    const el = document.querySelector(`[data-set-value-for="${sid}"]`);
    if (el) el.textContent = ` · Your: ${fmtMoney(mine)}`;
  }

  document.getElementById('search').oninput = (e)=>{ query = e.target.value; render(); };

  function updateModeUI(){
    document.querySelectorAll('.mode-bar .mode-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.mode === mode);
    });
    document.getElementById('modeHint').textContent =
      (mode === 'complete') ? 'One of each numbered card' : 'Every finish variant tracked separately';
  }
  document.querySelectorAll('.mode-bar .mode-btn').forEach(b=>{
    b.onclick = ()=>{
      const next = b.dataset.mode;
      if (next === mode) return;
      mode = next;
      saveMode();
      updateModeUI();
      render();
    };
  });
  updateModeUI();

  fetch('data/binder/_manifest.json')
    .then(r=>{ if (!r.ok) throw new Error('manifest not found'); return r.json(); })
    .then(d=>{ manifest = d; render(); })
    .catch(err=>{
      document.getElementById('content').innerHTML =
        '<div class="empty">Binder library is still being generated. Check back in a few minutes.</div>';
    });

  // ----- Cross-device sync wiring (mirrors binder.html) -----

  function fmtAgo(ms){
    if (!ms) return 'never';
    const sec = Math.max(0, Math.floor((Date.now() - ms) / 1000));
    if (sec < 5) return 'just now';
    if (sec < 60) return sec + 's ago';
    if (sec < 3600) return Math.floor(sec/60) + 'm ago';
    if (sec < 86400) return Math.floor(sec/3600) + 'h ago';
    return Math.floor(sec/86400) + 'd ago';
  }
  function setSyncStatus(text, kind){
    const el = document.getElementById('syncStatus');
    if (!el) return;
    el.className = 'sync-status' + (kind ? ' ' + kind : '');
    el.textContent = text;
  }
  function refreshSyncStatus(){
    if (!window.BinderSync) return;
    const last = BinderSync.getLastSyncedAt();
    if (last) setSyncStatus('Last synced ' + fmtAgo(last));
    else setSyncStatus(BinderSync.hasPassphrase() ? 'Not synced yet' : 'Not set up');
  }

  async function runSync(){
    if (!window.BinderSync || !BinderSync.isConfigured()) return;
    let pass = BinderSync.getStoredPassphrase();
    if (!pass){
      pass = await BinderSync.promptPassphrase({
        title: 'Set up sync',
        body: 'Pick a passphrase you can remember on every device. <b>This is end-to-end encrypted</b> — we can\'t recover it if you forget. Don\'t reuse a real password.',
        okLabel: 'Save & sync'
      });
      if (!pass) return;
      BinderSync.setStoredPassphrase(pass);
    }
    const btn = document.getElementById('syncBtn');
    btn.disabled = true;
    setSyncStatus('Syncing…', 'busy');
    try {
      await BinderSync.syncOnce(pass);
      setSyncStatus('Synced ' + fmtAgo(BinderSync.getLastSyncedAt()), 'ok');
    } catch (e){
      const msg = (e && e.message) || 'Sync failed';
      setSyncStatus(msg, 'err');
      if (/passphrase/i.test(msg)) BinderSync.setStoredPassphrase(null);
    } finally {
      btn.disabled = false;
    }
  }
  async function changePassphrase(){
    const next = await BinderSync.promptPassphrase({
      title: 'Change passphrase',
      body: 'Enter a new passphrase. We\'ll re-encrypt your local data with it on the next sync. Your old cloud row stays orphaned until you wipe it.',
      okLabel: 'Save'
    });
    if (!next) return;
    BinderSync.setStoredPassphrase(next);
    refreshSyncStatus();
  }
  async function clearPassphrase(){
    const ok = await BinderSync.confirm({
      title: 'Clear passphrase from this device?',
      body: 'Cloud data is untouched — sign back in with the same passphrase later. Local progress on this device stays.',
      okLabel: 'Clear'
    });
    if (!ok) return;
    BinderSync.setStoredPassphrase(null);
    refreshSyncStatus();
  }
  async function wipeCloud(){
    const pass = BinderSync.getStoredPassphrase();
    if (!pass){ setSyncStatus('Set a passphrase first', 'err'); return; }
    const ok = await BinderSync.confirm({
      title: 'Wipe cloud data?',
      body: 'Deletes the encrypted blob at your passphrase\'s row. Local progress is untouched. <b>This can\'t be undone.</b>',
      okLabel: 'Wipe',
      danger: true
    });
    if (!ok) return;
    try {
      await BinderSync.wipeCloud(pass);
      setSyncStatus('Cloud wiped', 'ok');
    } catch (e){
      setSyncStatus((e && e.message) || 'Wipe failed', 'err');
    }
  }

  function initSync(){
    if (!window.BinderSync) return;
    const bar = document.getElementById('syncBar');
    if (!BinderSync.isConfigured()){ bar.style.display = 'none'; return; }
    bar.style.display = 'flex';
    document.getElementById('syncBtn').onclick = runSync;
    document.getElementById('syncGear').onclick = (e) => {
      e.stopPropagation();
      BinderSync.openSettingsMenu(e.currentTarget, {
        onChange: changePassphrase,
        onClear: clearPassphrase,
        onWipe: wipeCloud
      });
    };
    refreshSyncStatus();
    setInterval(refreshSyncStatus, 30000);
  }

  if (document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', initSync);
  } else {
    initSync();
  }

  // Re-render after a successful sync — manifest counts haven't changed
  // but each tile's per-set progress reads from localStorage which was
  // just merged with cloud.
  window.addEventListener('binderSync:complete', () => { render(); });
})();
</script>
</body>
</html>
