<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Binder Mode — Pokemon Pack Guide</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a0a;
    color: #fff;
    padding: 16px;
    -webkit-tap-highlight-color: transparent;
  }
  .container { max-width: 1100px; margin: 0 auto; }
  header { text-align: center; padding: 16px 0 24px; border-bottom: 2px solid #333; margin-bottom: 24px; }
  h1 { font-size: 1.6rem; margin-bottom: 6px; }
  .sub { color: #888; font-size: 0.9rem; line-height: 1.5; }
  .sub a { color: #4a9eff; text-decoration: none; }
  .controls {
    display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
    margin-bottom: 16px; padding: 12px; background: #1a1a1a;
    border: 1px solid #333; border-radius: 10px;
  }
  .controls input[type=search] {
    flex: 1; min-width: 160px; padding: 10px 12px;
    background: #0a0a0a; border: 1px solid #333; border-radius: 6px;
    color: #fff; font-size: 0.95rem;
  }
  .controls button {
    padding: 10px 14px; background: #2a2a2a; border: 1px solid #444;
    border-radius: 6px; color: #fff; cursor: pointer; font-size: 0.85rem;
  }
  .controls button:hover { background: #3a3a3a; }
  .controls button.active { background: #4a9eff; border-color: #4a9eff; }
  .progress {
    color: #aaa; font-size: 0.85rem; margin-left: auto; font-variant-numeric: tabular-nums;
  }
  .progress strong { color: #4ade80; }
  .page-section {
    margin-bottom: 32px;
    padding: 16px; padding-top: 12px;
    background: #111; border: 1px solid #2a2a2a; border-radius: 12px;
  }
  .page-header {
    display: flex; justify-content: space-between; align-items: baseline;
    padding-bottom: 10px; margin-bottom: 12px; border-bottom: 1px dashed #333;
  }
  .page-title { font-size: 1.05rem; font-weight: 600; color: #4a9eff; }
  .page-meta { color: #666; font-size: 0.8rem; }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .slot {
    background: #1a1a1a; border: 2px solid #2a2a2a; border-radius: 8px;
    overflow: hidden; cursor: pointer; position: relative;
    transition: border-color .15s;
  }
  .slot.have { border-color: #4ade80; background: #0f1f15; }
  .slot.have .slot-img { opacity: 1; }
  .slot-img-wrap {
    position: relative; aspect-ratio: 245/342; background: #0a0a0a;
  }
  .slot-img {
    width: 100%; height: 100%; object-fit: contain;
    opacity: 0.65; transition: opacity .15s;
  }
  .have-badge {
    position: absolute; top: 6px; right: 6px;
    min-width: 26px; height: 26px; line-height: 26px;
    padding: 0 8px;
    background: #4ade80; color: #0a0a0a;
    border-radius: 13px;
    font-weight: 800; font-size: 1rem;
    text-align: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.5);
    display: none;
    pointer-events: none;
    z-index: 1;
    font-variant-numeric: tabular-nums;
  }
  .slot.have .have-badge { display: block; }
  .have-badge.multi { font-size: 0.85rem; padding: 0 9px; }
  .zoom-btn {
    position: absolute; top: 6px; left: 6px;
    width: 28px; height: 28px; line-height: 26px; text-align: center;
    background: rgba(0,0,0,0.7); color: #fff; border: 1px solid #555;
    border-radius: 50%; font-size: 0.85rem; cursor: pointer; z-index: 2;
    transition: background .1s;
  }
  .zoom-btn:hover, .zoom-btn:active { background: #4a9eff; border-color: #4a9eff; }
  .slot-meta {
    padding: 6px 8px; background: #1a1a1a;
    font-size: 0.72rem; line-height: 1.25;
  }
  .slot-num {
    color: #4a9eff; font-weight: 700; font-variant-numeric: tabular-nums;
  }
  .slot-name {
    color: #ddd; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .slot-rarity { color: #777; font-size: 0.65rem; }
  .variant-badge {
    display: inline-block;
    padding: 1px 6px;
    background: #2a2a2a;
    border: 1px solid #444;
    border-radius: 3px;
    font-size: 0.62rem;
    font-weight: 600;
    margin-right: 5px;
    letter-spacing: 0.02em;
    vertical-align: 1px;
  }
  .variant-badge.normal { background: #1a2638; border-color: #4a9eff66; color: #88bdff; }
  .variant-badge.holofoil { background: #38301a; border-color: #ffd24a66; color: #ffd966; }
  .variant-badge.reverseHolo { background: #1a3024; border-color: #4ade8066; color: #86efac; }
  .modal-info .variant-badge { font-size: 0.78rem; padding: 3px 10px; }
  .slot-price {
    font-size: 0.68rem; margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    font-variant-numeric: tabular-nums;
  }
  .raw-px { color: #4a9eff; font-weight: 600; }
  .psa-px { color: #ffd24a; font-weight: 600; }
  .psa-sep { color: #555; }
  .modal-prices {
    margin-top: 14px; display: inline-block;
    background: #1a1a1a; border: 1px solid #333; border-radius: 8px;
    padding: 10px 16px; text-align: left;
    font-variant-numeric: tabular-nums; min-width: 220px;
  }
  .mp-row {
    display: flex; justify-content: space-between; gap: 24px;
    font-size: 0.95rem; padding: 3px 0;
  }
  .mp-label { color: #888; }
  .mp-val { font-weight: 700; }
  .grade-yes-badge {
    margin-top: 10px; display: inline-block;
    background: #28a745; color: #fff;
    padding: 4px 12px; border-radius: 4px;
    font-size: 0.85rem; font-weight: 600;
  }
  .value-summary {
    margin-top: 14px; display: inline-block;
    background: #131313; border: 1px solid #2a2a2a; border-radius: 8px;
    padding: 8px 16px; font-size: 0.95rem;
    font-variant-numeric: tabular-nums;
  }
  .value-summary strong { color: #4ade80; font-weight: 700; }
  .value-summary .vs-of { color: #666; padding: 0 4px; }
  .value-summary .vs-total { color: #aaa; }
  .value-summary .vs-empty { color: #666; font-style: italic; }
  .empty { padding: 48px; text-align: center; color: #666; }
  .modal {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92);
    z-index: 100; align-items: center; justify-content: center; padding: 20px;
  }
  .modal.open { display: flex; }
  .modal-content {
    max-width: 500px; width: 100%; text-align: center;
  }
  .modal-content img { max-width: 100%; max-height: 75vh; border-radius: 12px; }
  .modal-info { margin-top: 14px; color: #ddd; }
  .modal-info .num { color: #4a9eff; font-weight: 700; }
  .modal-close {
    position: absolute; top: 16px; right: 16px;
    width: 40px; height: 40px; background: #1a1a1a; border: 1px solid #333;
    border-radius: 50%; color: #fff; font-size: 1.2rem; cursor: pointer;
  }
  @media (min-width: 700px) {
    .grid { gap: 12px; }
    .slot-meta { font-size: 0.8rem; padding: 8px 10px; }
  }
  @media (max-width: 480px) {
    body { padding: 10px; }
    h1 { font-size: 1.3rem; }
    .slot-meta { padding: 5px 6px; font-size: 0.68rem; }
    .slot-rarity { display: none; }
    .slot-price .psa-sep, .slot-price .psa-px { display: none; }
  }
</style>
    <script defer src="https://static.cloudflareinsights.com/beacon.min.js" data-cf-beacon='{"token":"CF_TOKEN_PLACEHOLDER"}'></script>
</head>
<body>
<div class="container">
  <header>
    <h1 id="setName">Loading…</h1>
    <div class="sub" id="setSub"></div>
    <div class="value-summary" id="valueSummary" style="display:none;"></div>
    <div class="sub" style="margin-top:6px;"><a href="index.html">← All sets</a></div>
  </header>

  <div class="controls">
    <input type="search" id="search" placeholder="Search by name or number…" />
    <button id="filterAll" class="active" data-filter="all">All</button>
    <button id="filterHave" data-filter="have">Have</button>
    <button id="filterNeed" data-filter="need">Need</button>
    <button id="resetBtn" title="Clear all checked">Reset</button>
    <div class="progress" id="progress"></div>
  </div>

  <div id="pages"></div>
</div>

<div class="modal" id="modal">
  <button class="modal-close" id="modalClose">×</button>
  <div class="modal-content">
    <img id="modalImg" src="" alt="">
    <div class="modal-info" id="modalInfo"></div>
  </div>
</div>

<script>
(function(){
  const params = new URLSearchParams(location.search);
  const setId = params.get('set') || 'base1';
  const STORAGE_KEY = 'binder_have_' + setId;
  const QTY_CAP = 99;
  const LONG_PRESS_MS = 500;

  // Schema is an object: { "<slotId>": <quantity> }. Older versions used an
  // Array of slot IDs (binary have/not). loadHave() detects + migrates the
  // legacy format on the fly, so users coming from older builds keep all
  // their progress.
  function loadHave(){
    let raw;
    try { raw = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(e){ return {}; }
    if (Array.isArray(raw)){
      const obj = {};
      for (const id of raw) obj[id] = 1;
      return obj;
    }
    if (raw && typeof raw === 'object'){
      const out = {};
      for (const k in raw){
        const v = +raw[k];
        if (Number.isFinite(v) && v > 0) out[k] = Math.min(QTY_CAP, Math.floor(v));
      }
      return out;
    }
    return {};
  }
  let haveQty = loadHave();

  let setData = null;
  let filter = 'all';
  let query = '';

  function saveHave(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(haveQty));
  }
  function getQty(id){ return haveQty[id] || 0; }
  function setQty(id, qty){
    if (qty <= 0) delete haveQty[id];
    else haveQty[id] = Math.min(QTY_CAP, qty);
  }
  function badgeText(qty){
    if (qty <= 0) return '';
    if (qty === 1) return '✓';
    return '✓×' + qty;
  }

  function pageOfSlot(idx){ // 0-based card index -> 1-based page, 1-based slot
    return { page: Math.floor(idx/9)+1, slot: (idx%9)+1 };
  }

  function fmtPrice(p){
    if (p == null) return '';
    if (p >= 1000) return '$' + Math.round(p).toLocaleString();
    if (p >= 10) return '$' + Math.round(p);
    return '$' + p.toFixed(2);
  }

  // Aggregate-money formatter — always whole dollars w/ commas. For set totals.
  function fmtMoney(p){
    if (p == null || isNaN(p)) return '$0';
    return '$' + Math.round(p).toLocaleString();
  }

  function escHtml(s){
    return String(s ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
  }

  function variantBadge(c){
    if (!c.variant || !c.variantLabel) return '';
    return `<span class="variant-badge ${c.variant}">${escHtml(c.variantLabel)}</span>`;
  }

  // Migrate older localStorage entries (bare card IDs) to the variant-aware
  // schema. For each old ID that no longer matches a valid slot, map to the
  // first variant (priority order: Regular -> Holo -> Reverse Holo) of that
  // card. Existing valid IDs pass through untouched. Run once per session
  // load; safe to re-run.
  function migrateHave(haveObj, cards){
    const validIds = new Set();
    const firstVariantByCardId = {};
    for (const c of cards){
      validIds.add(c.id);
      const base = c.cardId || c.id;
      if (firstVariantByCardId[base] === undefined){
        firstVariantByCardId[base] = c.id;
      }
    }
    let migrated = 0, dropped = 0;
    const out = {};
    for (const id in haveObj){
      const qty = haveObj[id];
      if (validIds.has(id)){ out[id] = qty; continue; }
      const mapped = firstVariantByCardId[id];
      if (mapped){
        // If both old bare ID and a variant somehow coexist, sum the qtys
        out[mapped] = Math.min(QTY_CAP, (out[mapped] || 0) + qty);
        migrated++;
      } else dropped++;
    }
    return { migrated, dropped, obj: out };
  }

  function render(){
    const wrap = document.getElementById('pages');
    wrap.innerHTML = '';
    if (!setData) return;

    const cards = setData.cards;
    const totalPages = Math.ceil(cards.length / 9);
    const q = query.trim().toLowerCase();

    let visibleCount = 0;
    for (let p=0; p<totalPages; p++){
      const pageCards = cards.slice(p*9, p*9+9);
      // filter
      const shown = pageCards.filter(c=>{
        const qty = getQty(c.id);
        if (filter==='have' && qty <= 0) return false;
        if (filter==='need' && qty > 0) return false;
        if (q){
          if (!c.name.toLowerCase().includes(q) && c.n != q) return false;
        }
        return true;
      });
      if (shown.length===0) continue;

      const sec = document.createElement('div');
      sec.className = 'page-section';
      const pageHaveCount = pageCards.filter(c => getQty(c.id) > 0).length;
      const firstN = pageCards[0].n, lastN = pageCards[pageCards.length-1].n;
      const range = firstN === lastN ? `#${firstN}` : `#${firstN}–#${lastN}`;
      sec.innerHTML = `
        <div class="page-header">
          <div class="page-title">Binder Page ${p+1}</div>
          <div class="page-meta">Cards ${range} · ${pageHaveCount}/${pageCards.length} slotted</div>
        </div>
        <div class="grid"></div>
      `;
      const grid = sec.querySelector('.grid');
      shown.forEach(c=>{
        const slotIdx = pageCards.indexOf(c)+1;
        const div = document.createElement('div');
        const qty = getQty(c.id);
        div.className = 'slot' + (qty > 0 ? ' have' : '');
        div.dataset.id = c.id;
        const priceHtml = (c.raw != null) ? `
            <div class="slot-price">
              <span class="raw-px">${fmtPrice(c.raw)}</span>${c.psa10 ? `<span class="psa-sep"> · </span><span class="psa-px">PSA10 ${fmtPrice(c.psa10)}</span>` : ''}
            </div>` : '';
        const rarityLine = `${variantBadge(c)}${escHtml(c.rarity || '')}`;
        const badgeClass = (qty >= 2) ? 'have-badge multi' : 'have-badge';
        div.innerHTML = `
          <div class="slot-img-wrap">
            <button class="zoom-btn" title="Enlarge">🔍</button>
            <span class="${badgeClass}">${badgeText(qty)}</span>
            <img class="slot-img" src="${c.img}" alt="${escHtml(c.name)}" loading="lazy">
          </div>
          <div class="slot-meta">
            <div><span class="slot-num">#${escHtml(c.n)}</span> · slot ${slotIdx}</div>
            <div class="slot-name">${escHtml(c.name)}</div>
            <div class="slot-rarity">${rarityLine}</div>${priceHtml}
          </div>
        `;
        div.querySelector('.zoom-btn').addEventListener('click', (e)=>{
          e.stopPropagation();
          openModal(c);
        });
        attachSlotHandlers(div, c);
        grid.appendChild(div);
        visibleCount++;
      });
      wrap.appendChild(sec);
    }

    if (visibleCount===0){
      wrap.innerHTML = '<div class="empty">No cards match.</div>';
    }
    updateProgress();
  }

  // Repaint a single slot's "have" state + badge after a qty change.
  function refreshSlotVisual(div, c){
    const qty = getQty(c.id);
    if (qty > 0) div.classList.add('have');
    else div.classList.remove('have');
    const badge = div.querySelector('.have-badge');
    if (badge){
      badge.textContent = badgeText(qty);
      badge.classList.toggle('multi', qty >= 2);
    }
  }

  // Recompute the page header "Cards #N–#M · X/9 slotted" line.
  function refreshPageMeta(div){
    const sec = div.closest('.page-section');
    if (!sec) return;
    const meta = sec.querySelector('.page-meta');
    const pageNumMatch = sec.querySelector('.page-title').textContent.match(/Page (\d+)/);
    if (!pageNumMatch) return;
    const p = parseInt(pageNumMatch[1])-1;
    const pageCards = setData.cards.slice(p*9, p*9+9);
    const cnt = pageCards.filter(x => getQty(x.id) > 0).length;
    const firstN = pageCards[0].n, lastN = pageCards[pageCards.length-1].n;
    const range = firstN === lastN ? `#${firstN}` : `#${firstN}–#${lastN}`;
    meta.textContent = `Cards ${range} · ${cnt}/${pageCards.length} slotted`;
  }

  // Tap to cycle qty (0 -> 1 -> 2 -> ... -> QTY_CAP).
  // Long-press (>= LONG_PRESS_MS) resets qty to 0.
  // Pointer Events unify mouse/touch/pen and are universally supported.
  function attachSlotHandlers(div, c){
    let pressTimer = null;
    let didLongPress = false;
    const cancel = () => {
      if (pressTimer){ clearTimeout(pressTimer); pressTimer = null; }
    };
    div.addEventListener('pointerdown', (e) => {
      if (e.target.closest('.zoom-btn')) return;
      didLongPress = false;
      pressTimer = setTimeout(() => {
        pressTimer = null;
        didLongPress = true;
        setQty(c.id, 0);
        saveHave();
        refreshSlotVisual(div, c);
        refreshPageMeta(div);
        updateProgress();
      }, LONG_PRESS_MS);
    });
    div.addEventListener('pointerup', cancel);
    div.addEventListener('pointerleave', cancel);
    div.addEventListener('pointercancel', cancel);
    div.addEventListener('click', (e) => {
      if (e.target.closest('.zoom-btn')) return;
      if (didLongPress){ didLongPress = false; return; }
      const cur = getQty(c.id);
      setQty(c.id, cur + 1);
      saveHave();
      refreshSlotVisual(div, c);
      refreshPageMeta(div);
      updateProgress();
    });
  }

  function updateProgress(){
    const total = setData.cards.length;
    const got = setData.cards.filter(c => getQty(c.id) > 0).length;
    const pct = total ? Math.round(got/total*100) : 0;
    document.getElementById('progress').innerHTML = `<strong>${got}</strong>/${total} (${pct}%)`;
    updateValueSummary();
  }

  function updateValueSummary(){
    const el = document.getElementById('valueSummary');
    if (!setData){ el.style.display = 'none'; return; }
    let total = 0, mine = 0;
    for (const c of setData.cards){
      if (c.raw == null) continue;
      total += c.raw;
      const qty = getQty(c.id);
      if (qty > 0) mine += c.raw * qty;  // duplicates count toward your value
    }
    if (total <= 0){
      el.style.display = 'inline-block';
      el.innerHTML = '<span class="vs-empty">Pricing not yet available for this set</span>';
      return;
    }
    el.style.display = 'inline-block';
    el.innerHTML =
      `Your binder: <strong>${fmtMoney(mine)}</strong>` +
      `<span class="vs-of">of</span>` +
      `<span class="vs-total">${fmtMoney(total)} total</span>`;
  }

  function openModal(c){
    document.getElementById('modalImg').src = c.large || c.img;
    document.getElementById('modalImg').alt = c.name;
    const pricesHtml = (c.raw != null) ? `
      <div class="modal-prices">
        <div class="mp-row"><span class="mp-label">Raw</span><span class="mp-val raw-px">$${c.raw.toFixed(2)}</span></div>
        ${c.psa10 != null ? `<div class="mp-row"><span class="mp-label">PSA 10</span><span class="mp-val psa-px">$${c.psa10.toFixed(2)}</span></div>` : ''}
        ${c.grade_worthy ? '<div class="grade-yes-badge">Worth Grading</div>' : ''}
      </div>` : '';
    const headLine = `<span class="num">#${escHtml(c.n)}</span> · ${escHtml(c.name)}${c.variant ? ' ' + variantBadge(c) : ''}${c.rarity ? ' · ' + escHtml(c.rarity) : ''}`;
    document.getElementById('modalInfo').innerHTML = headLine + pricesHtml;
    document.getElementById('modal').classList.add('open');
  }
  document.getElementById('modalClose').onclick = ()=> document.getElementById('modal').classList.remove('open');
  document.getElementById('modal').onclick = (e)=>{ if (e.target.id==='modal') e.target.classList.remove('open'); };

  document.querySelectorAll('.controls button[data-filter]').forEach(b=>{
    b.onclick = ()=>{
      filter = b.dataset.filter;
      document.querySelectorAll('.controls button[data-filter]').forEach(x=>x.classList.toggle('active', x===b));
      render();
    };
  });
  document.getElementById('search').oninput = (e)=>{ query = e.target.value; render(); };
  document.getElementById('resetBtn').onclick = ()=>{
    if (confirm('Clear all slotted cards for this set?')){
      haveQty = {}; saveHave(); render();
    }
  };

  fetch('data/binder/' + setId + '.json')
    .then(r=>{ if (!r.ok) throw new Error('No data for set: '+setId); return r.json(); })
    .then(d=>{
      setData = d;
      // One-time migration for users who slotted cards before variant tracking.
      const result = migrateHave(haveQty, d.cards);
      if (result.migrated > 0 || result.dropped > 0){
        haveQty = result.obj;
        saveHave();
      }
      document.title = d.name + ' Binder — Pokemon Pack Guide';
      document.getElementById('setName').textContent = d.name + ' — Master Set Binder';
      const totalPages = Math.ceil(d.cards.length/9);
      const uniqueCards = new Set(d.cards.map(c => c.cardId || c.id)).size;
      const slotSummary = (uniqueCards === d.cards.length)
        ? `${d.cards.length} cards`
        : `${d.cards.length} slots (${uniqueCards} cards · variants tracked separately)`;
      document.getElementById('setSub').innerHTML =
        `${slotSummary} · ${totalPages} binder pages (9-pocket) · Released ${d.release_date}<br>` +
        `<b>Tap a card to add 1</b> (tap again for 2, 3…). <b>Long-press</b> to clear. Tap 🔍 to enlarge. Saves on this device.`;
      render();
    })
    .catch(err=>{
      document.getElementById('setName').textContent = 'Set not found';
      document.getElementById('setSub').textContent = err.message;
    });
})();
</script>
</body>
</html>
