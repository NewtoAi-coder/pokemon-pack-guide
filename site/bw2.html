<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emerging Powers - Pokemon Pack Guide</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header { 
            text-align: center; 
            padding: 40px 0; 
            border-bottom: 2px solid #333;
            margin-bottom: 40px;
        }
        h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .subtitle { color: #888; font-size: 1.1rem; }
        .search-bar {
            width: 100%;
            max-width: 600px;
            margin: 0 auto 40px;
            padding: 15px 20px;
            font-size: 1rem;
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 8px;
            color: #fff;
        }
        .sets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 60px;
        }
        .set-card {
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
            cursor: pointer;
        }
        .set-card:hover {
            border-color: #4a9eff;
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(74, 158, 255, 0.3);
        }
        .set-logo {
            width: 100%;
            height: 120px;
            object-fit: contain;
            margin-bottom: 15px;
        }
        .set-name { font-size: 1.3rem; font-weight: 600; margin-bottom: 8px; }
        .set-meta { color: #888; font-size: 0.9rem; margin-bottom: 4px; }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 24px;
            margin-top: 40px;
        }
        .card-item {
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 12px;
            padding: 16px;
            transition: all 0.3s;
        }
        .card-item:hover {
            border-color: #4a9eff;
            transform: scale(1.02);
        }
        .card-image {
            width: 100%;
            border-radius: 8px;
            margin-bottom: 12px;
        }
        .card-name { font-size: 1.1rem; font-weight: 600; margin-bottom: 8px; }
        .price-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 0.95rem;
        }
        .price-label { color: #888; }
        .price-value { font-weight: 600; color: #4a9eff; }
        .grade-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 8px;
        }
        .grade-yes { background: #28a745; color: #fff; }
        .grade-no { background: #666; color: #ccc; }
        .back-link {
            display: inline-block;
            margin: 20px 0;
            padding: 10px 20px;
            background: #333;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            transition: background 0.3s;
        }
        .back-link:hover { background: #444; }
    </style>
</head>
<body>
    <div class="container">
        
        <a href="index.html" class="back-link">← Back to All Sets</a>
        <header>
            <h1>Emerging Powers</h1>
            <p class="subtitle">Released: 2011/08/31 • Black & White</p>
            <p class="subtitle">Total Cards: 98</p>
        </header>
        <h2 style="margin-bottom: 20px; color: #4a9eff;">Top Chase Cards</h2>
        <div class="card-grid">
            
        <div class="card-item">
            <img src="https://images.pokemontcg.io/bw2/97_hires.png" alt="Thundurus" class="card-image" loading="lazy">
            <div class="card-name">Thundurus #97</div>
            <div class="price-row">
                <span class="price-label">Raw:</span>
                <span class="price-value">$25.12</span>
            </div>
            <div class="price-row">
                <span class="price-label">PSA 10:</span>
                <span class="price-value">$87.92</span>
            </div>
            <div class="price-row">
                <span class="price-label">Rarity:</span>
                <span>Rare Ultra</span>
            </div>
            <span class="grade-badge grade-no">Not Worth Grading</span>
        </div>
        
        </div>
    
    </div>
</body>
</html>
